<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Cumpleaños Familiares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Carga de Firebase SDK clásico para compatibilidad directa -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- PANTALLA DE LOGIN (PIN DE 4 DÍGITOS) -->
    <div id="login-screen" class="hidden fixed inset-0 bg-blue-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <span class="material-icons text-6xl text-blue-600 mb-2">lock</span>
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Acceso Familiar</h2>
            <p class="text-gray-500 text-sm mb-6">Ingresa el PIN de 4 dígitos para acceder a los cumpleaños.</p>
            <input type="password" id="pin-input" maxlength="4" placeholder="••••" class="w-32 text-center text-3xl tracking-widest p-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 mb-4">
            <p id="login-error" class="text-red-500 text-sm hidden mb-4">⚠️ PIN Incorrecto. Intenta de nuevo.</p>
            <button onclick="verificarPIN()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-md">Ingresar</button>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL -->
    <div id="app-content" class="container mx-auto p-4 max-w-md pb-24">
        
        <!-- Encabezado -->
        <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-5 rounded-2xl shadow-lg mb-6 text-center">
            <h1 class="text-2xl font-bold flex items-center justify-center gap-2">
                <span class="material-icons">cake</span> Cumples de la Familia
            </h1>
            <p class="text-blue-100 text-xs mt-1">¡Nunca más te olvides de saludar!</p>
        </header>

        <!-- PANEL DE HOY (OPCIÓN B) -->
        <div id="panel-hoy" class="mb-6">
            <!-- Se llena dinámicamente -->
        </div>

        <!-- LISTADO TOTAL DE CUMPLEAÑOS -->
        <div class="bg-white rounded-2xl shadow-md p-4 mb-6">
            <h3 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-1">
                <span class="material-icons text-indigo-500">star</span> Todos los Cumpleaños
            </h3>
            <div id="lista-cumples" class="divide-y divide-gray-100 max-h-60 overflow-y-auto pr-1">
                <!-- Se llena dinámicamente -->
            </div>
        </div>

        <!-- BOTÓN FLOTANTE PARA AGREGAR -->
        <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-full max-w-md px-4">
            <button onclick="toggleFormulario()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-xl transition flex items-center justify-center gap-2">
                <span class="material-icons">add_circle</span> Agregar Cumpleaños
            </button>
        </div>

        <!-- MODAL FORMULARIO -->
        <div id="modal-form" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-40 p-4">
            <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm">
                <h3 class="text-lg font-bold text-gray-800 mb-4">Nuevo Cumpleaños</h3>
                <form id="cumple-form" class="space-y-4">
                    <div>
                        <label class="block text-gray-600 text-sm font-medium mb-1">Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Ej: Tía Marta" class="w-full p-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-600 text-sm font-medium mb-1">Día</label>
                            <input type="number" id="dia" required min="1" max="31" placeholder="Ej: 15" class="w-full p-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-600 text-sm font-medium mb-1">Mes</label>
                            <select id="mes" required class="w-full p-2.5 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                                <option value="1">Enero</option><option value="2">Febrero</option>
                                <option value="3">Marzo</option><option value="4">Abril</option>
                                <option value="5">Mayo</option><option value="6">Junio</option>
                                <option value="7">Julio</option><option value="8">Agosto</option>
                                <option value="9">Septiembre</option><option value="10">Octubre</option>
                                <option value="11">Noviembre</option><option value="12">Diciembre</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button type="button" onclick="toggleFormulario()" class="w-1/2 border border-gray-300 text-gray-600 py-2.5 rounded-xl font-semibold">Cancelar</button>
                        <button type="submit" class="w-1/2 bg-indigo-600 text-white py-2.5 rounded-xl font-semibold shadow">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script>
        // CONFIGURACIÓN DE SEGURIDAD LOCAL
        const PIN_CORRECTO = "1234"; // 👈 CAMBIA TU PIN AQUÍ

        // CONFIGURACIÓN DE TU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAbQ6rToUzUgvhqFw5ynFpGQzI0pFDgb8I",
            authDomain: "cumples-familia.firebaseapp.com",
            projectId: "cumples-familia",
            storageBucket: "cumples-familia.firebasestorage.app",
            messagingSenderId: "456266355172",
            appId: "1:456266355172:web:89059503a341bd8cc8f7f1"
        };
        
        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('cumpleanos');

        // ── ONESIGNAL ──────────────────────────────────────────────
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "b6abb876-1772-4c93-9fe4-876e3e4873ec",
                notifyButton: { enable: false },
                promptOptions: {
                    slidedown: {
                        prompts: [{
                            type: "push",
                            autoPrompt: true,
                            text: {
                                actionMessage: "¿Querés recibir avisos de cumpleaños a las 9 AM?",
                                acceptButton: "Sí, avisar",
                                cancelButton: "Ahora no"
                            },
                            delay: { pageViews: 1, timeDelay: 3 }
                        }]
                    }
                }
            });
        });
        // ── FIN ONESIGNAL ──────────────────────────────────────────

        // Manejo de Pantallas y Validación de PIN
        function comprobarAcceso() {
            if (localStorage.getItem('access_granted') === 'true') {
                document.getElementById('app-content').classList.remove('hidden');
                inicializarApp();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        }

        function verificarPIN() {
            const pinInput = document.getElementById('pin-input').value;
            if (pinInput === PIN_CORRECTO) {
                localStorage.setItem('access_granted', 'true');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                inicializarApp();
            } else {
                const error = document.getElementById('login-error');
                error.classList.remove('hidden');
                document.getElementById('pin-input').value = '';
            }
        }

        function toggleFormulario() {
            const modal = document.getElementById('modal-form');
            modal.classList.toggle('hidden');
        }

        // Inicializar lógicas core de la App
        function inicializarApp() {
            escucharBaseDatos();
        }

        // Escuchar cambios de Firebase en tiempo real
        function escucharBaseDatos() {
            db.on('value', (snapshot) => {
                const data = snapshot.val();
                const lista = [];
                for (let id in data) {
                    lista.push({ id, ...data[id] });
                }
                renderizarComponentes(lista);
            });
        }

        function renderizarComponentes(lista) {
            const hoy = new Date();
            const diaHoy = hoy.getDate();
            const mesHoy = hoy.getMonth() + 1;

            // 1. Filtrar Cumpleaños de Hoy
            const cumpleañerosHoy = lista.filter(c => parseInt(c.dia) === diaHoy && parseInt(c.mes) === mesHoy);
            const panelHoy = document.getElementById('panel-hoy');

            if (cumpleañerosHoy.length > 0) {
                let nombres = cumpleañerosHoy.map(c => c.nombre).join(' y ');
                panelHoy.innerHTML = `
                    <div class="bg-gradient-to-br from-amber-400 to-orange-500 text-white p-5 rounded-2xl shadow-md text-center animate-bounce">
                        <span class="material-icons text-4xl mb-1">celebration</span>
                        <h2 class="text-xl font-bold">¡HOY CUMPLE AÑOS!</h2>
                        <p class="text-2xl font-extrabold mt-1">${nombres} 🎉</p>
                    </div>
                `;
            } else {
                panelHoy.innerHTML = `
                    <div class="bg-white p-4 rounded-2xl shadow-sm text-center border border-gray-100">
                        <p class="text-gray-500 font-medium text-sm flex items-center justify-center gap-1">
                            <span class="material-icons text-gray-400 text-base">sentiment_satisfied</span> Hoy no cumple años nadie
                        </p>
                    </div>
                `;
            }

            // 2. Renderizar Lista Completa Ordenada por Mes/Día
            const listaEl = document.getElementById('lista-cumples');
            listaEl.innerHTML = '';
            
            lista.sort((a, b) => (a.mes - b.mes) || (a.dia - b.dia));

            const mesesTexto = ["", "Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];

            lista.forEach(c => {
                const item = document.createElement('div');
                item.className = "flex items-center justify-between py-3";
                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="bg-indigo-50 text-indigo-600 font-bold rounded-xl h-12 w-12 flex flex-col items-center justify-center text-xs shadow-inner">
                            <span>${c.dia}</span>
                            <span class="text-[10px] uppercase font-medium text-indigo-400">${mesesTexto[c.mes]}</span>
                        </div>
                        <span class="font-semibold text-gray-700">${escapeHTML(c.nombre)}</span>
                    </div>
                    <button onclick="eliminarCumple('${c.id}')" class="text-gray-300 hover:text-red-500 transition p-1 rounded-lg hover:bg-gray-50">
                        <span class="material-icons text-lg">delete</span>
                    </button>
                `;
                listaEl.appendChild(item);
            });
        }

        // Guardar Datos en Firebase
        document.getElementById('cumple-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const dia = parseInt(document.getElementById('dia').value);
            const mes = parseInt(document.getElementById('mes').value);

            db.push({ nombre, dia, mes }, () => {
                toggleFormulario();
                document.getElementById('cumple-form').reset();
            });
        });

        // Eliminar Registro
        window.eliminarCumple = function(id) {
            if(confirm('¿Deseas eliminar este registro de cumpleaños?')) {
                firebase.database().ref('cumpleanos/' + id).remove();
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // Ejecutar comprobación al cargar la página
        comprobarAcceso();
    </script>
</body>
</html>
