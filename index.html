<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Cumpleaños Familiares</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="hidden fixed inset-0 bg-blue-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <span class="material-icons text-6xl text-blue-600 mb-2">lock</span>
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Acceso Familiar</h2>
            <p class="text-gray-500 text-sm mb-6">Ingresa el PIN de 4 dígitos para acceder a los cumpleaños.</p>

            <input
                type="password"
                id="pin-input"
                maxlength="4"
                placeholder="••••"
                class="w-32 text-center text-3xl tracking-widest p-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 mb-4"
            >

            <p id="login-error" class="text-red-500 text-sm hidden mb-4">
</html>
