name: Notificacion Cumpleanos 9AM Uruguay

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 09:00 AM Uruguay (UTC-3 permanente desde 2015)
  workflow_dispatch:

jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar cumpleaños y enviar notificación
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}

        run: |
          cat > /tmp/check_cumples.js << 'JSEOF'
          const https = require('https');

          function salirError(msg) {
            console.error('ERROR:', msg);
            process.exit(1);
          }

          if (!process.env.FIREBASE_DB_URL)   salirError('Falta FIREBASE_DB_URL');
          if (!process.env.ONESIGNAL_APP_ID)  salirError('Falta ONESIGNAL_APP_ID');
          if (!process.env.ONESIGNAL_API_KEY) salirError('Falta ONESIGNAL_API_KEY');

          // Uruguay es UTC-3 permanente (abolió el horario de verano en 2015)
          const ahora = new Date();
          const hoyUY = new Date(ahora.getTime() + (ahora.getTimezoneOffset() - 180) * 60000);
          const DIA_HOY = hoyUY.getDate();
          const MES_HOY = hoyUY.getMonth() + 1;
          console.log('Fecha Uruguay: ' + DIA_HOY + '/' + MES_HOY + '/' + hoyUY.getFullYear());

          const baseUrl = process.env.FIREBASE_DB_URL.replace(/\/$/, '');
          const firebaseUrl = baseUrl + '/cumpleanos.json';
          console.log('Consultando Firebase...');

          https.get(firebaseUrl, (res) => {
            let raw = '';
            res.on('data', c => { raw += c; });
            res.on('end', () => {
              if (res.statusCode < 200 || res.statusCode >= 300) {
                salirError('Firebase status ' + res.statusCode + ': ' + raw);
              }

              let datos;
              try { datos = JSON.parse(raw); } catch(e) { salirError('JSON invalido: ' + e.message); }

              if (!datos || Object.keys(datos).length === 0) {
                console.log('Sin cumpleanos registrados. Fin.');
                process.exit(0);
              }

              const hoy = Object.values(datos).filter(c =>
                parseInt(c.dia) === DIA_HOY && parseInt(c.mes) === MES_HOY
              );

              if (hoy.length === 0) {
                console.log('No hay cumpleanos hoy. Fin.');
                process.exit(0);
              }

              const nombres = hoy.map(c => {
                if (!c.anio) return c.nombre;
                let edad = hoyUY.getFullYear() - parseInt(c.anio);
                if (new Date(hoyUY.getFullYear(), parseInt(c.mes)-1, parseInt(c.dia)) > hoyUY) edad--;
                return c.nombre + ' (' + edad + ' anos)';
              });

              const titulo = hoy.length === 1
                ? 'Hoy cumple anos ' + nombres[0] + '!'
                : 'Hoy hay ' + hoy.length + ' cumpleanos!';
              const cuerpo = hoy.length === 1
                ? 'No te olvides de saludar a ' + nombres[0] + ' 🎉'
                : 'Cumpleanos de hoy: ' + nombres.join(' y ') + ' 🎉';

              console.log('Enviando: ' + titulo);

              const payload = JSON.stringify({
                app_id: process.env.ONESIGNAL_APP_ID,
                included_segments: ['Total Subscriptions'],
                headings: { es: titulo, en: titulo },
                contents: { es: cuerpo,  en: cuerpo  }
              });

              const opts = {
                hostname: 'onesignal.com',
                port: 443,
                path: '/api/v1/notifications',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Basic ' + process.env.ONESIGNAL_API_KEY,
                  'Content-Length': Buffer.byteLength(payload)
                }
              };

              const req = https.request(opts, (r) => {
                let body = '';
                r.on('data', c => { body += c; });
                r.on('end', () => {
                  console.log('OneSignal status: ' + r.statusCode);
                  console.log('OneSignal response: ' + body);
                  if (r.statusCode < 200 || r.statusCode >= 300) {
                    salirError('OneSignal error ' + r.statusCode);
                  }
                  console.log('Notificacion enviada correctamente.');
                });
              });

              req.on('error', e => salirError('Red OneSignal: ' + e.message));
              req.write(payload);
              req.end();
            });
          }).on('error', e => salirError('Red Firebase: ' + e.message));
JSEOF
          node /tmp/check_cumples.js
