name: Notificacion Cumpleanos 9AM

'on':
  schedule:
    - cron: '0 12 * * *'  # Ejecuta a las 12:00 UTC (09:00 AM hora de Uruguay)
  workflow_dispatch:      # Te permite probarlo manualmente con un botón en GitHub

jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar cumpleanos y notificar
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          // Validar que las variables de entorno existan
          if (!process.env.FIREBASE_DB_URL || !process.env.ONESIGNAL_APP_ID || !process.env.ONESIGNAL_API_KEY) {
            console.error('Error: Faltan configurar los Secrets en GitHub.');
            process.exit(1);
          }

          // Limpiar la URL de Firebase por si viene con barra al final
          const baseUrl = process.env.FIREBASE_DB_URL.replace(/\/$/, "");
          const firebaseUrl = `${baseUrl}/cumpleanos.json`;

          https.get(firebaseUrl, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                console.error(`Error al conectar con Firebase. Código de estado: ${res.statusCode}`);
                return;
              }

              const cumples = JSON.parse(data);
              if (!cumples) {
                console.log('No hay cumpleaños en la base de datos.');
                return;
              }

              // OBTENER FECHA EXACTA DE URUGUAY SIN ERRORES DE ZONA HORARIA
              const opcionesFecha = { timeZone: 'America/Montevideo', day: 'numeric', month: 'numeric' };
              const fechaUruguayStr = new Date().toLocaleString('es-UY', opcionesFecha);
              
              // fechaUruguayStr devuelve algo como "26/5" o "26/05"
              const [diaHoy, mesHoy] = fechaUruguayStr.split('/').map(num => parseInt(num, 10));

              console.log(`Fecha actual en Uruguay -> Día: ${diaHoy}, Mes: ${mesHoy}`);

              const lista = Object.values(cumples);
              const cumpleaneros = lista.filter(c =>
                parseInt(c.dia, 10) === diaHoy && parseInt(c.mes, 10) === mesHoy
              );

              if (cumpleaneros.length === 0) {
                console.log('Hoy no cumple años nadie. No se envía notificación.');
                return;
              }

              const nombres = cumpleaneros.map(c => c.nombre).join(' y ');
              const mensaje = `Hoy es el cumpleaños de ${nombres}. ¡No te olvides de saludar! 🎈🎉`;
              console.log('Enviando notificación: ' + mensaje);

              const body = JSON.stringify({
                app_id: process.env.ONESIGNAL_APP_ID,
                included_segments: ['Total Subscriptions'],
                headings: { es: '¡Cumpleaños Hoy! 🎂' },
                contents: { es: mensaje }
              });

              const options = {
                hostname: 'api.onesignal.com',
                path: '/notifications',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Key ' + process.env.ONESIGNAL_API_KEY
                }
              };

              const req = https.request(options, (res) => {
                let respuesta = '';
                res.on('data', chunk => respuesta += chunk);
                res.on('end', () => {
                  console.log('Respuesta de OneSignal: ' + respuesta);
                });
              });

              req.on('error', (e) => {
                console.error('Error al enviar a OneSignal: ' + e.message);
              });

              req.write(body);
              req.end();
            });
          }).on('error', (e) => {
            console.error('Error al leer Firebase: ' + e.message);
          });
          EOF
