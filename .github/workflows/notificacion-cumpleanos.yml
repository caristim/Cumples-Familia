name: Notificacion Cumpleanos 9AM

on:
  schedule:
    # 11:00 UTC = 09:00 Uruguay (UTC-2 en verano, UTC-3 en invierno)
    # Esto asegura que se ejecute a las 9 AM en Uruguay todo el año
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest

    steps:
      - name: Verificar cumpleaños y enviar notificación
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}

        run: |
          node << 'EOF'

          const https = require('https');

          function salirError(msg) {
            console.error('❌ Error:', msg);
            process.exit(1);
          }

          function log(msg) {
            console.log('ℹ️ ', msg);
          }

          // Validar variables de entorno
          if (!process.env.FIREBASE_DB_URL) {
            salirError('Falta FIREBASE_DB_URL en los secretos de GitHub');
          }

          if (!process.env.ONESIGNAL_APP_ID) {
            salirError('Falta ONESIGNAL_APP_ID en los secretos de GitHub');
          }

          if (!process.env.ONESIGNAL_API_KEY) {
            salirError('Falta ONESIGNAL_API_KEY en los secretos de GitHub');
          }

          const baseUrl = process.env.FIREBASE_DB_URL.replace(/\/$/, '');
          const firebaseUrl = `${baseUrl}/cumpleanos.json`;

          log('Consultando Firebase en: ' + firebaseUrl);

          // Obtener la fecha actual en timezone de Uruguay (UTC-3 / UTC-2)
          const ahora = new Date();
          const horaUruguay = new Date(ahora.toLocaleString('es-UY', { timeZone: 'America/Montevideo' }));
          const diaHoy = horaUruguay.getDate();
          const mesHoy = horaUruguay.getMonth() + 1;

          log(`Fecha actual en Uruguay: ${diaHoy}/${mesHoy}/${horaUruguay.getFullYear()}`);

          https.get(firebaseUrl, (resFirebase) => {

            let data = '';

            resFirebase.on('data', chunk => {
              data += chunk;
            });

            resFirebase.on('end', () => {

              if (resFirebase.statusCode < 200 || resFirebase.statusCode >= 300) {
                salirError(`Firebase respondió con status ${resFirebase.statusCode}`);
              }

              let cumpleanos = {};
              try {
                cumpleanos = JSON.parse(data);
              } catch (e) {
                salirError('Error al parsear JSON de Firebase: ' + e.message);
              }

              if (!cumpleanos || Object.keys(cumpleanos).length === 0) {
                log('No hay cumpleaños registrados en Firebase');
                process.exit(0);
              }

              // Filtrar cumpleaños de hoy
              const cumpleHoy = [];
              for (let id in cumpleanos) {
                const cumple = cumpleanos[id];
                if (parseInt(cumple.dia) === diaHoy && parseInt(cumple.mes) === mesHoy) {
                  cumpleHoy.push(cumple.nombre);
                }
              }

              if (cumpleHoy.length === 0) {
                log('Hoy no hay cumpleaños que celebrar');
                process.exit(0);
              }

              log(`¡Encontrados ${cumpleHoy.length} cumpleaños para hoy!`);
              log('Cumpleaños: ' + cumpleHoy.join(', '));

              // Preparar mensaje
              const nombres = cumpleHoy.join(' y ');
              const titulo = cumpleHoy.length === 1 ? '¡Hoy cumple años!' : '¡Hoy cumplen años!';
              const mensaje = `${nombres} está de cumpleaños hoy. ¡No olvides saludar! 🎉`;

              // Enviar notificación a través de OneSignal
              const appId = process.env.ONESIGNAL_APP_ID;
              const apiKey = process.env.ONESIGNAL_API_KEY;

              const notificationData = {
                app_id: appId,
                included_segments: ['All'],
                headings: { en: titulo },
                contents: { en: mensaje },
                big_picture: 'https://cdn-icons-png.flaticon.com/512/3159/3159066.png',
                large_icon: 'https://cdn-icons-png.flaticon.com/512/3159/3159066.png',
                ios_badgeType: 'Increase',
                ios_badgeCount: 1
              };

              log('Enviando notificación a través de OneSignal...');

              const options = {
                hostname: 'onesignal.com',
                port: 443,
                path: '/api/v1/notifications',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json; charset=utf-8',
                  'Authorization': 'Basic ' + apiKey
                }
              };

              const req = https.request(options, (res) => {
                let responseData = '';

                res.on('data', chunk => {
                  responseData += chunk;
                });

                res.on('end', () => {
                  if (res.statusCode === 200) {
                    log('✅ Notificación enviada exitosamente a todos los usuarios');
                    log('Respuesta de OneSignal: ' + responseData);
                    process.exit(0);
                  } else {
                    salirError(`OneSignal respondió con status ${res.statusCode}: ${responseData}`);
                  }
                });
              });

              req.on('error', (error) => {
                salirError('Error al conectar con OneSignal: ' + error.message);
              });

              req.write(JSON.stringify(notificationData));
              req.end();

            });

          }).on('error', (error) => {
            salirError('Error al conectar con Firebase: ' + error.message);
          });

          EOF
