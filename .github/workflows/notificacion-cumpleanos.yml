name: Notificacion Cumpleanos 9AM

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  enviar-notificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar cumpleanos y notificar
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const firebaseUrl = process.env.FIREBASE_DB_URL + '/cumpleanos.json';

          https.get(firebaseUrl, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              const cumples = JSON.parse(data);
              if (!cumples) {
                console.log('No hay cumpleanos en la base de datos.');
                return;
              }

              const ahora = new Date();
              const uruguayOffset = -3 * 60;
              const localTime = new Date(ahora.getTime() + uruguayOffset * 60000);
              const diaHoy = localTime.getUTCDate();
              const mesHoy = localTime.getUTCMonth() + 1;

              console.log('Buscando cumpleanos para dia ' + diaHoy + ', mes ' + mesHoy);

              const lista = Object.values(cumples);
              const cumpleaneros = lista.filter(c =>
                parseInt(c.dia) === diaHoy && parseInt(c.mes) === mesHoy
              );

              if (cumpleaneros.length === 0) {
                console.log('Hoy no cumple anos nadie. No se envia notificacion.');
                return;
              }

              const nombres = cumpleaneros.map(c => c.nombre).join(' y ');
              const mensaje = 'Hoy es el cumpleanos de ' + nombres + ' Felicitalo!';
              console.log('Enviando notificacion: ' + mensaje);

              const body = JSON.stringify({
                app_id: process.env.ONESIGNAL_APP_ID,
                included_segments: ['Total Subscriptions'],
                headings: { es: 'Cumpleanos Hoy!' },
                contents: { es: mensaje }
              });

              const options = {
                hostname: 'api.onesignal.com',
                path: '/notifications',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Key ' + process.env.ONESIGNAL_API_KEY
                }
              };

              const req = https.request(options, (res) => {
                let respuesta = '';
                res.on('data', chunk => respuesta += chunk);
                res.on('end', () => {
                  console.log('Respuesta de OneSignal: ' + respuesta);
                });
              });

              req.on('error', (e) => {
                console.error('Error al enviar: ' + e.message);
              });

              req.write(body);
              req.end();
            });
          }).on('error', (e) => {
            console.error('Error al leer Firebase: ' + e.message);
          });
          EOF
